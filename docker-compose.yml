services:
  postgres:
    image: postgres:16
    container_name: autorepair-kiosk-postgres
    environment:
      POSTGRES_DB: autorepair_kiosk
      POSTGRES_USER: autorepair
      POSTGRES_PASSWORD: autorepair
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autorepair -d autorepair_kiosk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
